# Nginx конфигурация для AkatsukiSoap
# Копируется в /etc/nginx/sites-available/ скриптом deploy.sh

# Перенаправление HTTP → HTTPS (раскомментируйте после настройки SSL)
# server {
#     listen 80;
#     server_name YOUR_DOMAIN;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl;  # Раскомментируйте после настройки SSL
    server_name YOUR_DOMAIN;

    # SSL (раскомментируйте после certbot)
    # ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # Статические файлы
    location /static/ {
        alias /opt/akatsukisoap/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Медиа файлы (загрузки пользователей)
    location /media/ {
        alias /opt/akatsukisoap/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Favicon
    location /favicon.ico {
        alias /opt/akatsukisoap/staticfiles/favicon.ico.bmp;
        access_log off;
        log_not_found off;
    }

    # Проксирование на Gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
